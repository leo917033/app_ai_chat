<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <!-- 響應式設定，讓手機與不同解析度裝置能正常顯示 -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TypeScript HTML App</title>
  <style>
    /* 設定 html 和 body 不顯示滾動條 */
    html, body {
      overflow: hidden;
      margin: 0;
    }
     /* 防止手機左右滑動造成頁面回彈 */
    html {
      overscroll-behavior-x: none;
      touch-action: none;
    }
    /* body 使用 flex 佈局 */
    body {
      display: flex;
      flex-wrap: wrap;
    }
     /* 如果 body 裡只有一個 canvas，讓它填滿整個畫面 */
    body > canvas:only-child {
      width: 100vw;
      height: 100vh;
    }
  </style>
  <!-- Live2DCubismCore script -->
  <script src = "./Core/live2dcubismcore.js"></script>
  <!-- Build script -->
  <script type="module" crossorigin src="assets/index-Text.js"></script>
</head>
<body>

</html>
